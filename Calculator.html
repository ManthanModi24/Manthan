<!DOCTYPE html>
<html>
<head>
  <title>iPhone Style Calculator</title>
  <style>
    body {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; background: #000;
      font-family: Arial, sans-serif;
    }
    .calc {
      width: 320px; background: #000; padding: 20px; border-radius: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
    }
    #result {
      width: 100%; height: 80px; text-align: right; font-size: 40px;
      margin-bottom: 20px; padding: 10px; border: none;
      background: #000; color: #fff; border-radius: 10px;
    }
    .btns { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    button {
      height: 70px; font-size: 24px; border: none;
      border-radius: 50%; cursor: pointer;
      transition: 0.2s; font-weight: bold;
    }
    /* Number buttons */
    .num { background: #333; color: #fff; }
    .num:hover { background: #555; }

    /* Special buttons */
    .light { background: #a5a5a5; color: #000; }
    .light:hover { background: #bbb; }

    /* Operators */
    .op { background: #ff9500; color: #fff; }
    .op:hover { background: #e68a00; }

    /* Equals */
    .eq { background: #34c759; color: #fff; grid-column: span 2; border-radius: 40px; }

    /* Zero button */
    .zero { grid-column: span 2; border-radius: 40px; }
    header {
  position: absolute;
  top: 20px;
  left: 20px;
}

header a {
  text-decoration:solid;
  font-size: 10px;
  color: dodgerblue;
  padding: 8px 15px;
}

header a:hover {
  background: dodgerblue;
  color: white;
}

  </style>
</head>
<body>
  <header>
  <a href="Projects.html">Projects</a>
  </header>
  <div class="calc">
    <input type="text" id="result" disabled>
    <div class="btns">
      <button class="light" onclick="res.value=''">AC</button>
      <button class="light" onclick="res.value=res.value.slice(0,-1)">C</button>
      <button class="light" onclick="res.value=res.value.startsWith('-')?res.value.slice(1):'-'+res.value">+/-</button>
      <button class="light" onclick="res.value=res.value/100">%</button>
      <button class="op" onclick="res.value+='/'">÷</button>

      <button class="num" onclick="res.value+='7'">7</button>
      <button class="num" onclick="res.value+='8'">8</button>
      <button class="num" onclick="res.value+='9'">9</button>
      <button class="op" onclick="res.value+='*'">×</button>

      <button class="num" onclick="res.value+='4'">4</button>
      <button class="num" onclick="res.value+='5'">5</button>
      <button class="num" onclick="res.value+='6'">6</button>
      <button class="op" onclick="res.value+='-'">−</button>

      <button class="num" onclick="res.value+='1'">1</button>
      <button class="num" onclick="res.value+='2'">2</button>
      <button class="num" onclick="res.value+='3'">3</button>
      <button class="op" onclick="res.value+='+'">+</button>

      <button class="num zero" onclick="res.value+='0'">0</button>
      <button class="num" onclick="res.value+='.'">.</button>
      <button class="eq" onclick="try{res.value=eval(res.value)}catch{res.value='Error'}">=</button>
    </div>
  </div>

  <script>
    let res = document.getElementById('result');
  </script>
</body>
</html>
